site_name: NimbusVault Backend — Design Docs
site_description: Architecture and API-creation contract for the NimbusVault backend.
site_url: https://nuva-org.github.io/NimbusVaultBackend/
repo_url: https://github.com/Nuva-Org/NimbusVaultBackend
repo_name: Nuva-Org/NimbusVaultBackend
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.jpg
  favicon: assets/logo.jpg
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight
    - search.share
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji

plugins:
  - search

extra:
  generator: false

extra_css:
  - assets/extra.css

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture:
      - Overview: architecture/overview.md
      - Request lifecycle: architecture/request-lifecycle.md
      - Orchestrators: architecture/orchestrators.md
      - Data layer (Models & service.py): architecture/data-layer.md
      - Plugins (architecture view): architecture/plugins.md
      - Async & deployment: architecture/async-and-deployment.md
      - Configuration: architecture/configuration.md
  - API Creation Guide:
      - The contract: api-guide/contract.md
      - Worked example: api-guide/walkthrough.md
      - Good practices: api-guide/good-practices.md
      - Review checklist: api-guide/review-checklist.md
  - Plugins:
      - Overview: plugins/overview.md
      - Development guide: plugins/development-guide.md
      - Active plugins: plugins/active-plugins.md
  - Reference:
      - Key files: reference/key-files.md
      - Conventions: reference/conventions.md
  - LLM manifest: llms.txt
